# Pier job: codex → LiteLLM Responses proxy → Baseten Chat Completions.
#
# BLOCKED until LiteLLM proxy is running (POST /v1/responses → Baseten).
# Deferred: deploy LiteLLM proxy with a model pointing at BASETEN_BASE_URL, then
# uncomment LITELLM_PROXY_* in .env and update base_url in config_toml below.
#
# Setup (once proxy exists):
#   pier run -c codex.yaml --env-file .env -y
#
# Other agent jobs: mini-swe-agent-dev.yaml, mini-swe-agent-full.yaml, claude-code.yaml, opencode.yaml, cursor-cli.yaml

agents:
  - name: codex
    # Keep in sync with BASETEN_MODEL in .env
    model_name: openai/subconscious/tim-qwen3.6-27b
    env:
      OPENAI_API_KEY: ${LITELLM_PROXY_API_KEY}
      OPENAI_BASE_URL: ${LITELLM_PROXY_BASE_URL}
    kwargs:
      config_toml: |
        model_provider = "litellm"
        [model_providers.litellm]
        name = "LiteLLM Responses Proxy"
        base_url = "http://127.0.0.1:4000/v1"
        wire_api = "responses"
        env_key = "OPENAI_API_KEY"

datasets:
  - path: tasks
    n_tasks: 1
    sample_seed: 0

environment:
  type: docker

jobs_dir: jobs
