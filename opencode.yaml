# Pier job: opencode → Baseten Chat Completions.
#
# Setup:
#   cp .env.example .env   # fill in BASETEN_* and sync model slug below
#   pier run -c opencode.yaml --env-file .env -y
#
# Other agent jobs: mini-swe-agent-dev.yaml, mini-swe-agent-full.yaml, claude-code.yaml, codex.yaml, cursor-cli.yaml
# Smoke test (default): 1 task. For a larger subset, raise n_tasks or remove it.

agents:
  - name: opencode
    # Keep in sync with BASETEN_MODEL in .env
    model_name: openai/subconscious/tim-qwen3.6-27b
    env:
      OPENAI_API_KEY: ${BASETEN_API_KEY}
      OPENAI_BASE_URL: ${BASETEN_BASE_URL}

datasets:
  - path: tasks
    n_tasks: 1
    sample_seed: 0

environment:
  type: docker

jobs_dir: jobs
