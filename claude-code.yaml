# Pier job: claude-code → Baseten Messages API.
#
# Setup:
#   cp .env.example .env   # fill in BASETEN_* and sync model slug below
#   pier run -c claude-code.yaml --env-file .env -y
#
# Other agent jobs: mini-swe-agent-dev.yaml, mini-swe-agent-full.yaml, opencode.yaml, codex.yaml, cursor-cli.yaml
# Smoke test (default): 1 task. For a larger subset, raise n_tasks or remove it.

agents:
  - name: claude-code
    # Keep in sync with BASETEN_MODEL in .env (full slug when ANTHROPIC_BASE_URL is set)
    model_name: subconscious/tim-qwen3.6-27b
    env:
      ANTHROPIC_AUTH_TOKEN: ${BASETEN_API_KEY}
      ANTHROPIC_BASE_URL: ${BASETEN_ANTHROPIC_BASE_URL}
      # Baseten expects Authorization Bearer, not x-api-key
      ANTHROPIC_CUSTOM_HEADERS: "Authorization: Bearer ${BASETEN_API_KEY}"

datasets:
  - path: tasks
    n_tasks: 1
    sample_seed: 0

environment:
  type: docker

jobs_dir: jobs
